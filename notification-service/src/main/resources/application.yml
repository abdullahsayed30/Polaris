spring:
  application:
    name: notification-service
  main:
    web-application-type: none
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    listener:
      observation-enabled: true
    template:
      observation-enabled: true

server:
  port: 8083

management:
  endpoints:
    jmx:
      exposure:
        include: health,info
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${POLARIS_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
      export:
        enabled: ${POLARIS_TRACING_EXPORT_ENABLED:false}
  opentelemetry:
    resource-attributes:
      service.namespace: polaris
      deployment.environment: ${POLARIS_DEPLOYMENT_ENVIRONMENT:local}

logging:
  structured:
    format:
      console: ecs

polaris:
  kafka:
    topics:
      orders-created: polaris.orders.created
      inventory-adjusted: polaris.inventory.adjusted
      notifications-dlq: polaris.notifications.dlq
  notifications:
    retry:
      max-attempts: 3
      initial-interval: 250ms
      multiplier: 2.0

---
spring:
  config:
    activate:
      on-profile: local

---
spring:
  config:
    activate:
      on-profile: docker
  main:
    web-application-type: servlet
  kafka:
    bootstrap-servers: kafka:9092
