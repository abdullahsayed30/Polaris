name: Reusable CI

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Name prefix for uploaded CI artifacts.
        required: false
        type: string
        default: polaris
      java-version:
        description: Exact Java version used for the build.
        required: false
        type: string
        default: '25'
      maven-args:
        description: Additional Maven arguments appended to Maven commands.
        required: false
        type: string
        default: ''
      run-integration-tests:
        description: Run Testcontainers-backed integration tests with Maven verify.
        required: false
        type: boolean
        default: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven
          cache-dependency-path: |
            pom.xml
            **/pom.xml

      - name: Confirm toolchain
        run: |
          java -version
          ./mvnw --version

      - name: Run formatting and style checks
        run: ./mvnw -B -ntp spotless:check checkstyle:check ${{ inputs.maven-args }}

      - name: Run unit tests
        run: ./mvnw -B -ntp test ${{ inputs.maven-args }}

      - name: Run integration tests
        if: ${{ inputs.run-integration-tests }}
        run: ./mvnw -B -ntp test-compile failsafe:integration-test failsafe:verify ${{ inputs.maven-args }}

      - name: Package without integration tests
        if: ${{ !inputs.run-integration-tests }}
        run: ./mvnw -B -ntp -DskipTests package ${{ inputs.maven-args }}

      - name: Run Trivy repository scan
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: v0.70.0
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload test reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}-test-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail on Trivy critical findings
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        run: |
          set -euo pipefail

          critical_count="$(jq -r '
            [
              .runs[].results[]
              | (.message.text | capture("Severity: (?<severity>[A-Z]+)")? | .severity) as $severity
              | select($severity == "CRITICAL")
            ]
            | length
          ' trivy-results.sarif)"

          if [ "$critical_count" -gt 0 ]; then
            echo "::error::Trivy found $critical_count CRITICAL vulnerability result(s). Review the uploaded SARIF report."
            exit 1
          fi

          echo "Trivy found no critical vulnerabilities. Non-critical vulnerabilities are reported in the uploaded SARIF report."
