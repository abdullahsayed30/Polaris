server:
  port: 8081

spring:
  application:
    name: order-service
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/polaris_orders
    username: polaris_order
    password: polaris_order
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

polaris:
  kafka:
    topics:
      order-created: polaris.orders.created
  inventory:
    grpc:
      host: localhost
      port: 9090
      deadline: 2s

---
spring:
  config:
    activate:
      on-profile: local

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://order-postgres:5432/polaris_orders
  kafka:
    bootstrap-servers: kafka:9092

polaris:
  inventory:
    grpc:
      host: inventory-service
      port: 9090
